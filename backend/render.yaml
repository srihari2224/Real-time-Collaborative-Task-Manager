services:
  - type: web
    name: taskflow-backend
    env: node
    region: singapore        # closest to ap-south-1; change to oregon/frankfurt as needed
    plan: free               # upgrade to starter for persistent disk
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000          # Render injects PORT automatically; this is the default
      - key: HOST
        value: 0.0.0.0
      - key: API_VERSION
        value: v1
      - key: LOG_LEVEL
        value: info

      # ── Fill these in Render Dashboard → Environment ──
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_POOL_MIN
        value: "2"
      - key: DATABASE_POOL_MAX
        value: "10"

      - key: REDIS_URL
        sync: false           # Paste your Redis URL (Upstash / Redis Cloud free tier)
      - key: REDIS_TLS
        value: "true"         # Most hosted Redis providers require TLS

      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-south-1
      - key: S3_BUCKET_NAME
        sync: false
      - key: S3_BUCKET_URL
        sync: false
      - key: S3_PRESIGNED_URL_EXPIRY
        value: "3600"

      - key: SES_FROM_EMAIL
        sync: false
      - key: SES_FROM_NAME
        value: TaskFlow
      - key: SES_REGION
        value: us-east-1

      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d

      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app,http://localhost:3000
      - key: WS_CORS_ORIGIN
        value: https://your-frontend.vercel.app
      - key: BULL_REDIS_URL
        sync: false

      - key: RATE_LIMIT_MAX
        value: "100"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: MAX_FILE_SIZE_MB
        value: "10"
      - key: ALLOWED_FILE_TYPES
        value: image/jpeg,image/png,image/gif,image/webp,application/pdf,text/plain,application/zip
